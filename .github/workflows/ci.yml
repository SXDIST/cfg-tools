name: Desktop CI

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: desktop-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: desktop-ci-win
            build_command: npm run build:desktop:win
          - os: ubuntu-latest
            artifact_name: desktop-ci-linux
            build_command: npm run build:desktop:linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install NSIS
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          choco install nsis --no-progress -y
          "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install dependencies
        run: npm ci

      - name: Sync Wails version metadata
        run: npm run sync:wails-version

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Add Go bin to PATH
        shell: bash
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build desktop app
        run: ${{ matrix.build_command }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            build/bin/**
          if-no-files-found: error

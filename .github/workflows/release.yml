name: Desktop Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: desktop-build-windows
            build_command: npm run build:desktop:win
            asset_glob: |
              release-assets/windows/*
          - os: ubuntu-latest
            artifact_name: desktop-build-linux
            build_command: npm run build:desktop:linux
            asset_glob: |
              release-assets/linux/*

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install NSIS
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          choco install nsis --no-progress -y
          "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install dependencies
        run: npm ci

      - name: Sync Wails version metadata
        run: npm run sync:wails-version

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Add Go bin to PATH
        shell: bash
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build desktop app
        run: ${{ matrix.build_command }}

      - name: Package Windows artifacts
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path release-assets/windows | Out-Null
          Write-Host "Files produced by Wails:"
          Get-ChildItem build/bin -Recurse -File | ForEach-Object { Write-Host $_.FullName }
          $binary = Get-ChildItem build/bin -Recurse -Filter *.exe -File | Where-Object { $_.Name -notmatch "installer|setup|nsis" } | Select-Object -First 1
          if (-not $binary) { throw "Portable Windows binary not found in build/bin" }
          Compress-Archive -LiteralPath $binary.FullName -DestinationPath ("release-assets/windows/" + $binary.BaseName + "-windows-amd64.zip") -Force
          $installer = Get-ChildItem build/bin -Recurse -File | Where-Object { $_.Name -match "installer|setup|nsis" } | Select-Object -First 1
          if (-not $installer) { throw "Windows installer not found in build/bin" }
          Copy-Item -LiteralPath $installer.FullName -Destination release-assets/windows -Force

      - name: Package Linux artifacts
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p release-assets/linux
          binary="$(find build/bin -maxdepth 1 -type f -name 'cfg-tools*' ! -name '*.deb' ! -name '*.rpm' ! -name '*.AppImage' ! -name '*.tar.gz' | head -n 1)"
          if [[ -z "$binary" ]]; then
            echo "Linux binary not found in build/bin" >&2
            exit 1
          fi
          tar -C "$(dirname "$binary")" -czf "release-assets/linux/$(basename "$binary")-linux-amd64.tar.gz" "$(basename "$binary")"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.asset_glob }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Compute release metadata
        id: release_meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG_NAME="${GITHUB_REF#refs/tags/}"
          else
            VERSION="$(node -p "require('./package.json').version")"
            TAG_NAME="v${VERSION}"
          fi

          RELEASE_NAME="cfg-tools ${TAG_NAME}"
          TAG_SHA="$(git ls-remote origin "refs/tags/${TAG_NAME}" | awk '{print $1}')"

          if [[ -n "${TAG_SHA}" && "${TAG_SHA}" != "${GITHUB_SHA}" ]]; then
            echo "::notice::Release tag ${TAG_NAME} already exists on ${TAG_SHA}; skipping release for ${GITHUB_SHA}."
            echo "skip_release=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [[ -z "${TAG_SHA}" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "${TAG_NAME}" "${GITHUB_SHA}"
            git push origin "refs/tags/${TAG_NAME}"
          fi

          echo "skip_release=false" >> "${GITHUB_OUTPUT}"
          echo "tag_name=${TAG_NAME}" >> "${GITHUB_OUTPUT}"
          echo "release_name=${RELEASE_NAME}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=false" >> "${GITHUB_OUTPUT}"

      - name: Download Windows artifacts
        if: steps.release_meta.outputs.skip_release != 'true'
        uses: actions/download-artifact@v4
        with:
          name: desktop-build-windows
          path: release-assets/windows

      - name: Download Linux artifacts
        if: steps.release_meta.outputs.skip_release != 'true'
        uses: actions/download-artifact@v4
        with:
          name: desktop-build-linux
          path: release-assets/linux

      - name: Publish GitHub release
        if: steps.release_meta.outputs.skip_release != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag_name }}
          name: ${{ steps.release_meta.outputs.release_name }}
          generate_release_notes: true
          prerelease: ${{ steps.release_meta.outputs.prerelease == 'true' }}
          files: |
            release-assets/windows/*
            release-assets/linux/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Desktop Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: desktop-build-win
            build_command: npm run build:desktop:win
          - os: ubuntu-latest
            artifact_name: desktop-build-linux
            build_command: npm run build:desktop:linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build desktop app
        run: ${{ matrix.build_command }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist-electron/**
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Compute release metadata
        id: release_meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            RELEASE_NAME="cfg-tools ${TAG_NAME}"
            PRERELEASE="false"
          else
            TAG_NAME="nightly-${GITHUB_RUN_NUMBER}"
            RELEASE_NAME="cfg-tools nightly #${GITHUB_RUN_NUMBER}"
            PRERELEASE="true"
          fi

          echo "tag_name=${TAG_NAME}" >> "${GITHUB_OUTPUT}"
          echo "release_name=${RELEASE_NAME}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${PRERELEASE}" >> "${GITHUB_OUTPUT}"

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: desktop-build-win
          path: release-assets/windows

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: desktop-build-linux
          path: release-assets/linux

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag_name }}
          name: ${{ steps.release_meta.outputs.release_name }}
          generate_release_notes: true
          prerelease: ${{ steps.release_meta.outputs.prerelease == 'true' }}
          files: |
            release-assets/windows/**
            release-assets/linux/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
